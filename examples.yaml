  aggregations:
  - SUM
  - ROW_NUMBER
  dimensions:
  - region
  - supplier
  - supplier_type
  pattern_type: window_function_top_n
  complexity: 4
  difficulty: hard
  note: Window function (ROW_NUMBER) to find top 5 suppliers per region with classification.
- id: ex057
  question: Suppliers accounting for top 80% of spend by region and commodity with year-to-date comparison
  sql: "WITH regional_commodity_spend AS (\n  SELECT REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME, YEAR(INVOICE_DATE) AS year,\n         SUM(AMOUNT) AS supplier_spend\n  FROM DBO.VW_DIRECT_SPEND_ALL\n  GROUP BY REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME, YEAR(INVOICE_DATE)\n),\nsupplier_ranked AS (\n  SELECT REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME, year, supplier_spend,\n         PERCENT_RANK() OVER (PARTITION BY REGION, COMMODITY ORDER BY supplier_spend DESC) AS percentile\n  FROM regional_commodity_spend\n)\nSELECT REGION, COMMODITY, year, SUPPLIER_NO, SUPPLIER_NAME, supplier_spend, percentile\nFROM supplier_ranked\nWHERE percentile <= 0.20\nORDER BY REGION, COMMODITY, year, percentile\n"
  intent: percentile_threshold
  entities:
  - region
  - commodity
  - supplier
  - year
  aggregations:
  - SUM
  - PERCENT_RANK
  dimensions:
  - region
  - commodity
  - year
  - supplier
  pattern_type: window_function_percentile
  complexity: 4
  difficulty: hard
  note: 'Percentile filtering (PERCENT_RANK) across 4 dimensions: region, commodity, supplier, year.'
- id: ex058
  question: Average unit price and total volume by supplier and region for last 2 years, top 10 by spend
  sql: "SELECT TOP 10 SUPPLIER_NO, SUPPLIER_NAME, REGION, YEAR(INVOICE_DATE) AS year,\n       COUNT(DISTINCT ARTICLE_NO) AS article_count,\n       SUM(AMOUNT) AS total_spend,\n       AVG(AMOUNT) AS avg_unit_price,\n       COUNT(*) AS invoice_lines,\n       SUM(AMOUNT) / NULLIF(COUNT(DISTINCT ARTICLE_NO), 0) AS spend_per_article\nFROM DBO.VW_DIRECT_SPEND_ALL\nWHERE INVOICE_DATE >= CAST(GETDATE() AS DATE) - 730\nGROUP BY SUPPLIER_NO, SUPPLIER_NAME, REGION, YEAR(INVOICE_DATE)\nORDER BY total_spend DESC\n"
