- id: ex053
  question: Spend by incoterm responsibility (Buyer vs Supplier vs Shared)
  sql: "SELECT CASE WHEN INCO_TERM IN ('EXW','FCA','FOB','CIF') THEN 'Buyer'\n            WHEN INCO_TERM IN ('DAP','DDP','DDU') THEN 'Supplier'\n            WHEN INCO_TERM IN ('CPT','CIP') THEN 'Shared'\n            WHEN INCO_TERM = '999' THEN 'Unknown'\n            ELSE 'Unclassified' END AS responsibility,\n       SUM(AMOUNT) AS total_spend, COUNT(DISTINCT SUPPLIER_NO) AS supplier_count\nFROM DBO.VW_DIRECT_SPEND_ALL\nGROUP BY CASE WHEN INCO_TERM IN ('EXW','FCA','FOB','CIF') THEN 'Buyer'\n              WHEN INCO_TERM IN ('DAP','DDP','DDU') THEN 'Supplier'\n              WHEN INCO_TERM IN ('CPT','CIP') THEN 'Shared'\n              WHEN INCO_TERM = '999' THEN 'Unknown'\n              ELSE 'Unclassified' END\nORDER BY total_spend DESC\n"
  intent: incoterm_analysis
  entities:
  - supplier
  - incoterm
  aggregations:
  - SUM
  - COUNT
  pattern_type: classification_analysis
  complexity: 3
  difficulty: hard
  note: 'Incoterm responsibility: EXW/FCA/FOB/CIF=Buyer, DAP/DDP/DDU=Supplier, CPT/CIP=Shared, 999=Unknown, NULL/blank=Unclassified.'
