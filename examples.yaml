- id: ex055
  question: Materials sourced from multiple regions with material classification
  sql: "SELECT ARTICLE_NO, MATERIAL_DESCRIPTION,\n       CASE WHEN OEM IN ('J','Y') THEN 'OEM Nominated' ELSE 'MPP Nominated' END AS material_type,\n       COUNT(DISTINCT REGION) AS region_count, SUM(AMOUNT) AS total_spend\nFROM DBO.VW_DIRECT_SPEND_ALL\nGROUP BY ARTICLE_NO, MATERIAL_DESCRIPTION, OEM\nHAVING COUNT(DISTINCT REGION) > 1\nORDER BY region_count DESC, total_spend DESC\n"
