  sql: "SELECT YEAR(INVOICE_DATE) AS YEAR,\n       MONTH(INVOICE_DATE) AS MONTH,\n       SUM(AMOUNT) AS MONTHLY_SPEND,\n       LAG(SUM(AMOUNT)) OVER (ORDER BY YEAR(INVOICE_DATE), MONTH(INVOICE_DATE)) AS PREV_MONTH,\n       ROUND((SUM(AMOUNT) - LAG(SUM(AMOUNT)) OVER (ORDER BY YEAR(INVOICE_DATE), MONTH(INVOICE_DATE))) /\n             NULLIF(LAG(SUM(AMOUNT)) OVER (ORDER BY YEAR(INVOICE_DATE), MONTH(INVOICE_DATE)), 0) * 100, 2) AS MOM_CHANGE_PCT\nFROM DBO.VW_DIRECT_SPEND_ALL\nGROUP BY YEAR(INVOICE_DATE), MONTH(INVOICE_DATE)\nORDER BY YEAR, MONTH\n"
