  question: Top 10 suppliers by spend (with name and classification)
  sql: "SELECT TOP 10 SUPPLIER_NO, SUPPLIER_NAME,\n       CASE WHEN ABC_INDICATOR = 'G' THEN 'Motherson Group' ELSE 'External' END AS supplier_type,\n       SUM(AMOUNT) AS total_spend\nFROM DBO.VW_DIRECT_SPEND_ALL\nGROUP BY SUPPLIER_NO, SUPPLIER_NAME, ABC_INDICATOR\nORDER BY total_spend DESC\n"
  intent: top_suppliers_with_classification
