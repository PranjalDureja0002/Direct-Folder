- id: ex103
  question: Top 80% suppliers by spend (pareto)
  sql: "WITH ranked AS (\n  SELECT SUPPLIER_NAME, SUM(AMOUNT) AS total_spend,\n         SUM(SUM(AMOUNT)) OVER (ORDER BY SUM(AMOUNT) DESC) AS cumulative_spend,\n         SUM(SUM(AMOUNT)) OVER () AS grand_total\n  FROM DBO.VW_DIRECT_SPEND_ALL\n  WHERE INVOICE_DATE >= '2024-04-01'\n  GROUP BY SUPPLIER_NAME\n)\nSELECT SUPPLIER_NAME, ROUND(total_spend, 2) AS TOTAL_SPEND,\n       ROUND(cumulative_spend * 100.0 / grand_total, 2) AS CUMULATIVE_PCT\nFROM ranked\nWHERE cumulative_spend <= grand_total * 0.80\nORDER BY total_spend DESC\n"
  intent: pareto
  sql_structure_type: pareto
  entities:
  - supplier
  aggregations:
  - SUM
  complexity: 4
  difficulty: hard
  note: 'Pareto/80-20: CTE with cumulative window SUM ordered DESC. Filter where cumulative <= threshold. Shows suppliers accounting for top 80% of spend.'
