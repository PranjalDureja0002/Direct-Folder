- id: ex052
  question: Spend by material classification (OEM vs MPP)
  sql: "SELECT CASE WHEN OEM IN ('J','Y') THEN 'OEM Nominated' ELSE 'MPP Nominated' END AS material_type,\n       SUM(AMOUNT) AS total_spend, COUNT(DISTINCT ARTICLE_NO) AS article_count\nFROM DBO.VW_DIRECT_SPEND_ALL\nGROUP BY CASE WHEN OEM IN ('J','Y') THEN 'OEM Nominated' ELSE 'MPP Nominated' END\nORDER BY total_spend DESC\n"
