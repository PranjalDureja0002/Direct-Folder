- id: ex060
  question: Cumulative supplier spend trend by region, commodity, and year
  sql: "WITH supplier_monthly_spend AS (\n  SELECT REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME,\n         YEAR(INVOICE_DATE) AS year,\n         MONTH(INVOICE_DATE) AS month,\n         SUM(AMOUNT) AS monthly_spend\n  FROM DBO.VW_DIRECT_SPEND_ALL\n  GROUP BY REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME,\n           YEAR(INVOICE_DATE), MONTH(INVOICE_DATE)\n)\nSELECT REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME, year, month, monthly_spend,\n       SUM(monthly_spend) OVER (PARTITION BY REGION, COMMODITY, SUPPLIER_NO ORDER BY year, month\n                                 ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS cumulative_spend\nFROM supplier_monthly_spend\nORDER BY REGION, COMMODITY, SUPPLIER_NO, year, month\n"
  intent: cumulative_sum
  entities:
  - region
  - commodity
  - supplier
  - year
  - month
  aggregations:
  - SUM
  - WINDOW
  dimensions:
  - region
  - commodity
  - supplier
  - year
  pattern_type: window_function_cumulative
  complexity: 4
  difficulty: hard
  note: Window function cumulative sum across 5 dimensions (region, commodity, supplier, year, month).
