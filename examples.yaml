- id: ex059
  question: Sourcing concentration by material classification, supplier type, and region
  sql: "SELECT REGION,\n       CASE WHEN OEM IN ('J','Y') THEN 'OEM Nominated' ELSE 'MPP Nominated' END AS material_source,\n       CASE WHEN ABC_INDICATOR = 'G' THEN 'Motherson Group' ELSE 'External' END AS supplier_type,\n       COUNT(DISTINCT SUPPLIER_NO) AS supplier_count,\n       COUNT(DISTINCT ARTICLE_NO) AS article_count,\n       SUM(AMOUNT) AS total_spend,\n       ROUND(SUM(AMOUNT) * 100.0 / SUM(SUM(AMOUNT)) OVER (PARTITION BY REGION), 2) AS pct_of_region\nFROM DBO.VW_DIRECT_SPEND_ALL\nGROUP BY REGION, OEM, ABC_INDICATOR\nORDER BY REGION, total_spend DESC\n"
  intent: classification_analysis
