- id: ex056
  question: Top 5 suppliers per region by total spend with supplier classification
  sql: "SELECT REGION, SUPPLIER_NO, SUPPLIER_NAME,\n       CASE WHEN ABC_INDICATOR = 'G' THEN 'Motherson Group' ELSE 'External' END AS supplier_type,\n       SUM(AMOUNT) AS total_spend,\n       ROW_NUMBER() OVER (PARTITION BY REGION ORDER BY SUM(AMOUNT) DESC) AS rank_in_region\nFROM DBO.VW_DIRECT_SPEND_ALL\nGROUP BY REGION, SUPPLIER_NO, SUPPLIER_NAME, ABC_INDICATOR\nHAVING ROW_NUMBER() OVER (PARTITION BY REGION ORDER BY SUM(AMOUNT) DESC) <= 5\nORDER BY REGION, rank_in_region\n"
  intent: top_n_by_partition
  entities:
  - region
  - supplier
